<!DOCTYPE html>
<html>
<head>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 1200px; height: 630px;
  background: #080e18;
  font-family: Georgia, serif;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  position: relative; overflow: hidden;
}
.grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(199,150,57,0.05) 1px, 
                    transparent 1px),
    linear-gradient(90deg, rgba(199,150,57,0.05) 1px, 
                    transparent 1px);
  background-size: 60px 60px;
}
.top-rule {
  position: absolute; top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, 
    transparent, #C79639, transparent);
}
.bottom-rule {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, 
    transparent, #C79639, transparent);
}
.logo-mark {
  width: 80px; height: 80px;
  border-radius: 16px;
  background: linear-gradient(135deg, #1A395B, #0f1f35);
  border: 2px solid #C79639;
  display: flex; align-items: center; 
  justify-content: center;
  font-size: 40px; color: #C79639; font-weight: 700;
  margin-bottom: 24px;
}
.company { 
  font-size: 16px; color: #C79639; 
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 24px;
}
.title {
  font-size: 64px; font-weight: 700;
  color: #ffffff; text-align: center;
  line-height: 1.1; margin-bottom: 20px;
}
.title em { color: #C79639; font-style: italic; }
.subtitle {
  font-family: Arial, sans-serif;
  font-size: 22px; color: #C7D7EF;
  font-weight: 300; text-align: center;
  max-width: 700px;
}
.content { position: relative; z-index: 1; 
           text-align: center; padding: 60px; }
</style>
</head>
<body>
<div class="grid"></div>
<div class="top-rule"></div>
<div class="bottom-rule"></div>
<div class="content">
  <div class="logo-mark">M</div>
  <div class="company">MylesCorp Technologies Ltd</div>
  <div class="title">
    Transforming <em>East Africa</em>
  </div>
  <div class="subtitle">
    AI-powered solutions for Education, Healthcare, 
    Agriculture, and Business
  </div>
</div>
</body>
</html>
