<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C79639"/>
      <stop offset="100%" style="stop-color:#A67C2A"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Background pattern -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="80" fill="#C79639"/>
    <circle cx="1100" cy="530" r="120" fill="#C79639"/>
    <circle cx="600" cy="315" r="60" fill="#C79639"/>
  </g>
  
  <!-- Logo -->
  <g transform="translate(100, 200)">
    <!-- M Logo -->
    <path d="M80 40h30l20 80h-20l-5-20h-20l-5 20H60l20-80zm15 20l-5 20h10l-5-20z" fill="url(#gold)"/>
    <path d="M150 40h40c22 0 40 18 40 40v40c0 22-18 40-40 40h-40V40zm40 40v40h20v-40h-20z" fill="url(#gold)"/>
    <path d="M250 40v60h-20V40h-20V20h60v20h-20z" fill="url(#gold)"/>
    
    <!-- Technologies text -->
    <text x="80" y="160" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#C79639">Technologies</text>
  </g>
  
  <!-- Main text -->
  <text x="100" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">
    Transform Your Business
  </text>
  <text x="100" y="360" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#gold)">
    with AI-Powered Solutions
  </text>
  
  <!-- Tagline -->
  <text x="100" y="420" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8">
    Transforming Industries, Empowering Generations
  </text>
  
  <!-- Decorative elements -->
  <g opacity="0.3">
    <rect x="900" y="100" width="200" height="4" fill="url(#gold)"/>
    <rect x="900" y="120" width="150" height="4" fill="url(#gold)"/>
    <rect x="900" y="140" width="100" height="4" fill="url(#gold)"/>
  </g>
  
  <!-- Bottom accent -->
  <rect x="0" y="580" width="1200" height="50" fill="url(#gold)" opacity="0.2"/>
  
  <!-- URL -->
  <text x="100" y="560" font-family="Arial, sans-serif" font-size="20" fill="#94a3b8">
    www.mylesoft.com
  </text>
</svg>
