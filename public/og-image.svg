<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C79639"/>
      <stop offset="100%" style="stop-color:#A67C2A"/>
    </linearGradient>
    <linearGradient id="goldOverlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C79639;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#A67C2A;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#C79639;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Background pattern -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="80" fill="#C79639"/>
    <circle cx="1100" cy="530" r="120" fill="#C79639"/>
    <circle cx="600" cy="315" r="60" fill="#C79639"/>
    <circle cx="900" cy="200" r="40" fill="#C79639"/>
    <circle cx="300" cy="450" r="50" fill="#C79639"/>
  </g>
  
  <!-- Main Logo Container -->
  <g transform="translate(100, 180)">
    <!-- M Letter Design -->
    <path d="M80 40h40l20 80h-40l-5-20h-20l-5 20H60l20-80zm20 20l-2.5 20h5l-2.5-20z" fill="url(#gold)"/>
    <path d="M150 40h40c22 0 40 18 40 40v40c0 22-18 40-40 40h-40V40zm40 40v40h20V80h-20z" fill="url(#gold)"/>
    <path d="M250 40v60h-20V40h-20V20h60v20h-20t" fill="url(#gold)"/>
    
    <!-- Technologies Text -->
    <text x="80" y="160" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#gold)">Technologies</text>
  </g>
  
  <!-- Main Content Text -->
  <text x="100" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">
    Transform Your Business
  </text>
  <text x="100" y="360" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#gold)">
    with AI-Powered Solutions
  </text>
  
  <!-- Tagline -->
  <text x="100" y="420" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8">
    Transforming Industries, Empowering Generations
  </text>
  
  <!-- Decorative Elements -->
  <g opacity="0.3">
    <!-- Right side decorative lines -->
    <rect x="900" y="100" width="200" height="4" fill="url(#gold)"/>
    <rect x="900" y="120" width="150" height="4" fill="url(#gold)"/>
    <rect x="900" y="140" width="100" height="4" fill="url(#gold)"/>
    
    <!-- Floating accent circles -->
    <circle cx="950" cy="250" r="8" fill="url(#gold)" opacity="0.6"/>
    <circle cx="1050" cy="200" r="6" fill="url(#gold)" opacity="0.4"/>
    <circle cx="1000" cy="300" r="5" fill="url(#gold)" opacity="0.3"/>
  </g>
  
  <!-- Bottom accent bar -->
  <rect x="0" y="580" width="1200" height="50" fill="url(#gold)" opacity="0.2"/>
  
  <!-- URL -->
  <text x="100" y="560" font-family="Arial, sans-serif" font-size="20" fill="#94a3b8">
    www.mylesoft.com
  </text>
  
  <!-- Additional decorative elements -->
  <g opacity="0.2">
    <!-- Top left corner decoration -->
    <circle cx="50" cy="50" r="15" fill="url(#gold)"/>
    <circle cx="80" cy="30" r="8" fill="url(#gold)" opacity="0.7"/>
    <circle cx="30" cy="80" r="6" fill="url(#gold)" opacity="0.5"/>
    
    <!-- Bottom right corner decoration -->
    <circle cx="1150" cy="580" r="12" fill="url(#gold)"/>
    <circle cx="1170" cy="560" r="6" fill="url(#gold)" opacity="0.7"/>
    <circle cx="1130" cy="600" r="5" fill="url(#gold)" opacity="0.5"/>
  </g>
  
  <!-- Gold gradient overlay for premium effect -->
  <rect width="1200" height="630" fill="url(#goldOverlay)" opacity="0.3"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
</svg>
