    <path d="M15 15h15l7.5 30h-15l-2-7.5h-7.5l-2 7.5H7.5l7.5-30zm7.5 7.5l-1 7.5h2l-1-7.5z" fill="#C79639"/>
    <path d="M45 15h15c8.25 0 15 6.75 15 15v15c0 8.25-6.75 15-15 15H45V15zm15 15v15h7.5V30H60z" fill="#C79639"/>
    <path d="M82.5 15v22.5h-7.5V15h-7.5V7.5h22.5v7.5h-7.5z" fill="#C79639"/>
    
    <!-- Technologies Text -->
    <text x="15" y="67" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#C79639">Technologies</text>
  </g>
  
  <!-- Decorative Elements -->
  <g opacity="0.8">
